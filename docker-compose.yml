version: '3.8'

services:
  intellik8sbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: intellik8sbot
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      - DEFAULT_NAMESPACE=${DEFAULT_NAMESPACE:-default}
      - ALLOW_DESTRUCTIVE_OPERATIONS=${ALLOW_DESTRUCTIVE_OPERATIONS:-false}
      - DEBUG=${DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount kubeconfig for cluster access
      - ${HOME}/.kube:/root/.kube:ro
      # Persist database
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

