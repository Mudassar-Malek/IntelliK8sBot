<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliK8sBot - AI Kubernetes Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #326ce5;
            --primary-dark: #2557b8;
            --secondary: #00d4aa;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --bg-hover: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: #334155;
            --success: #22c55e;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 280px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: fixed;
        }

        .logo {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-weight: 700;
            font-size: 18px;
        }

        .nav-section {
            padding: 16px;
            flex: 1;
            overflow-y: auto;
        }

        .nav-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding: 0 12px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .nav-item:hover, .nav-item.active {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .main-content {
            flex: 1;
            margin-left: 280px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Chat Page Styles */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .message {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message-avatar.user {
            background: var(--primary);
        }

        .message-avatar.bot {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }

        .message-content {
            flex: 1;
            background: var(--bg-hover);
            padding: 16px 20px;
            border-radius: 12px;
            max-width: 80%;
        }

        .message-content pre {
            background: var(--bg-dark);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            margin: 12px 0;
        }

        .message-content code {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg-dark);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .chat-input-container {
            padding: 20px 24px;
            border-top: 1px solid var(--border);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-dark);
            border-radius: 12px;
            padding: 8px;
            border: 1px solid var(--border);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            padding: 12px 16px;
            outline: none;
            font-family: inherit;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--primary);
            border: none;
            color: white;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Dashboard Styles */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border);
        }

        .stat-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .stat-card-icon.nodes { background: rgba(50, 108, 229, 0.2); color: var(--primary); }
        .stat-card-icon.pods { background: rgba(0, 212, 170, 0.2); color: var(--secondary); }
        .stat-card-icon.deployments { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
        .stat-card-icon.services { background: rgba(239, 68, 68, 0.2); color: var(--error); }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 14px;
        }

        .resource-table {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 18px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg-hover);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        tr:hover {
            background: var(--bg-hover);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.running {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .status-badge.pending {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning);
        }

        .status-badge.failed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .status-badge.ready {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .welcome-message {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .welcome-icon {
            font-size: 48px;
        }

        .welcome-text h2 {
            margin-bottom: 8px;
        }

        .welcome-text p {
            opacity: 0.9;
        }

        .quick-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .quick-action-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .quick-action-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .connection-status {
            padding: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }

        .connection-dot.disconnected {
            background: var(--error);
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-dharmachakra"></i>
            </div>
            <span class="logo-text">IntelliK8sBot</span>
        </div>

        <nav class="nav-section">
            <div class="nav-title">Main</div>
            <div class="nav-item active" data-page="chat">
                <i class="fas fa-comments"></i>
                <span>AI Chat</span>
            </div>
            <div class="nav-item" data-page="dashboard">
                <i class="fas fa-th-large"></i>
                <span>Dashboard</span>
            </div>

            <div class="nav-title" style="margin-top: 24px;">Resources</div>
            <div class="nav-item" data-page="pods">
                <i class="fas fa-cubes"></i>
                <span>Pods</span>
            </div>
            <div class="nav-item" data-page="deployments">
                <i class="fas fa-layer-group"></i>
                <span>Deployments</span>
            </div>
            <div class="nav-item" data-page="services">
                <i class="fas fa-network-wired"></i>
                <span>Services</span>
            </div>
            <div class="nav-item" data-page="nodes">
                <i class="fas fa-server"></i>
                <span>Nodes</span>
            </div>

            <div class="nav-title" style="margin-top: 24px;">Insights</div>
            <div class="nav-item" data-page="events">
                <i class="fas fa-bell"></i>
                <span>Events</span>
            </div>
            <div class="nav-item" data-page="recommendations">
                <i class="fas fa-lightbulb"></i>
                <span>Recommendations</span>
            </div>
        </nav>

        <div class="connection-status">
            <div class="connection-dot" id="connectionDot"></div>
            <span id="connectionText">Checking cluster...</span>
        </div>
    </aside>

    <main class="main-content">
        <header class="header">
            <h1 class="header-title" id="pageTitle">AI Chat</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i>
                    Refresh
                </button>
                <button class="btn btn-primary" onclick="newSession()">
                    <i class="fas fa-plus"></i>
                    New Session
                </button>
            </div>
        </header>

        <div class="content-area">
            <!-- Chat Page -->
            <div id="chat-page" class="page active">
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages">
                        <div class="welcome-message">
                            <div class="welcome-icon">🤖</div>
                            <div class="welcome-text">
                                <h2>Welcome to IntelliK8sBot!</h2>
                                <p>I'm your AI-powered Kubernetes assistant. Ask me anything about your cluster!</p>
                                <div class="quick-actions">
                                    <button class="quick-action-btn" onclick="sendQuickMessage('Show me all pods')">Show Pods</button>
                                    <button class="quick-action-btn" onclick="sendQuickMessage('What is the cluster status?')">Cluster Status</button>
                                    <button class="quick-action-btn" onclick="sendQuickMessage('Are there any issues?')">Check Issues</button>
                                    <button class="quick-action-btn" onclick="sendQuickMessage('Help')">Help</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <div class="chat-input-wrapper">
                            <input type="text" class="chat-input" id="chatInput" placeholder="Ask me about your Kubernetes cluster..." onkeypress="handleKeyPress(event)">
                            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Dashboard Page -->
            <div id="dashboard-page" class="page">
                <div class="stats-grid" id="statsGrid">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
                <div class="resource-table" id="overviewTable"></div>
            </div>

            <!-- Pods Page -->
            <div id="pods-page" class="page">
                <div class="resource-table" id="podsTable">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Deployments Page -->
            <div id="deployments-page" class="page">
                <div class="resource-table" id="deploymentsTable">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Services Page -->
            <div id="services-page" class="page">
                <div class="resource-table" id="servicesTable">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Nodes Page -->
            <div id="nodes-page" class="page">
                <div class="resource-table" id="nodesTable">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Events Page -->
            <div id="events-page" class="page">
                <div class="resource-table" id="eventsTable">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>

            <!-- Recommendations Page -->
            <div id="recommendations-page" class="page">
                <div id="recommendationsContent">
                    <div class="loading"><div class="spinner"></div></div>
                </div>
            </div>
        </div>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
