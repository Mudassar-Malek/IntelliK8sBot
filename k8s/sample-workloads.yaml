# Sample Workloads for Testing IntelliK8sBot
# Apply with: kubectl apply -f k8s/sample-workloads.yaml

---
# Namespace for demo apps
apiVersion: v1
kind: Namespace
metadata:
  name: demo
  labels:
    purpose: testing

---
# A healthy NGINX deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-web
  namespace: demo
  labels:
    app: nginx
    tier: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        tier: frontend
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

---
# NGINX Service
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: demo
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

---
# Redis deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cache
  namespace: demo
  labels:
    app: redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: cache
    spec:
      containers:
      - name: redis
        image: redis:alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: demo
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---
# A simple API backend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-backend
  namespace: demo
  labels:
    app: api
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        tier: backend
    spec:
      containers:
      - name: api
        image: hashicorp/http-echo
        args:
        - "-text=Hello from API Backend"
        - "-listen=:5678"
        ports:
        - containerPort: 5678
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 50m
            memory: 64Mi

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: demo
spec:
  selector:
    app: api
  ports:
  - port: 5678
    targetPort: 5678

---
# A problematic pod (will fail - for troubleshooting demo)
apiVersion: v1
kind: Pod
metadata:
  name: failing-pod
  namespace: demo
  labels:
    app: failing-app
    status: problematic
spec:
  containers:
  - name: failing-container
    image: busybox
    command: ["sh", "-c", "echo 'Starting...' && sleep 5 && exit 1"]
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 20m
        memory: 32Mi
  restartPolicy: Always

---
# A pending pod (image doesn't exist - for troubleshooting demo)
apiVersion: v1
kind: Pod
metadata:
  name: pending-pod
  namespace: demo
  labels:
    app: pending-app
    status: stuck
spec:
  containers:
  - name: nonexistent
    image: this-image-does-not-exist:v999
    resources:
      requests:
        cpu: 10m
        memory: 16Mi

---
# ConfigMap for demo
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: demo
data:
  APP_ENV: "development"
  LOG_LEVEL: "debug"
  API_URL: "http://api-service:5678"
  REDIS_URL: "redis://redis-service:6379"

---
# Another namespace with workloads
apiVersion: v1
kind: Namespace
metadata:
  name: staging
  labels:
    environment: staging

---
# Staging deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: staging
  labels:
    app: web
    env: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        env: staging
    spec:
      containers:
      - name: web
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi

---
# Staging service
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: staging
spec:
  selector:
    app: web
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
