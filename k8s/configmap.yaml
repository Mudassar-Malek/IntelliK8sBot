apiVersion: v1
kind: ConfigMap
metadata:
  name: intellik8sbot-config
  namespace: intellik8sbot
  labels:
    app.kubernetes.io/name: intellik8sbot
data:
  APP_NAME: "IntelliK8sBot"
  APP_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  DEFAULT_NAMESPACE: "default"
  IN_CLUSTER: "true"
  ALLOW_DESTRUCTIVE_OPERATIONS: "false"
  REQUIRE_CONFIRMATION: "true"
  ENABLE_AUTO_REMEDIATION: "false"
  ENABLE_COST_ANALYSIS: "true"
  ENABLE_RESOURCE_RECOMMENDATIONS: "true"
