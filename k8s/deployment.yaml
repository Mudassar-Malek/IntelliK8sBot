apiVersion: apps/v1
kind: Deployment
metadata:
  name: intellik8sbot
  namespace: intellik8sbot
  labels:
    app.kubernetes.io/name: intellik8sbot
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: intellik8sbot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intellik8sbot
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: intellik8sbot
      containers:
        - name: intellik8sbot
          image: intellik8sbot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: intellik8sbot-config
            - secretRef:
                name: intellik8sbot-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          emptyDir: {}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: intellik8sbot
  namespace: intellik8sbot
  labels:
    app.kubernetes.io/name: intellik8sbot
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: intellik8sbot
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: intellik8sbot
  namespace: intellik8sbot
  labels:
    app.kubernetes.io/name: intellik8sbot
  annotations:
    # Adjust based on your ingress controller
    # nginx.ingress.kubernetes.io/rewrite-target: /
    # kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: intellik8sbot.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: intellik8sbot
                port:
                  name: http
